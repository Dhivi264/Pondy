# ============================================================
# Smart CCTV — Camera Configuration
# Load via: POST /lmp/config/yaml/import
#       or: config_registry.load_yaml("cameras.yaml")
# ============================================================
#
# All parameters explained
# ------------------------
# conf_threshold : float  0.0–1.0
#   Minimum certainty before a detection is accepted.
#   0.5 = "only report if model is 50%+ confident".
#   Prevents a swaying bush from being flagged as a person.
#   Recommended range: 0.4 (sensitive) to 0.6 (strict).
#
# frame_skip : int  ≥1
#   Process every Nth frame.  skip=5 uses 1/5 the CPU of skip=1.
#   Raspberry Pi / Intel NCS: use 5.  Server GPU: use 1.
#
# classes : list[int] | null
#   COCO class IDs to forward.  null = all classes.
#   Common IDs: 0=person  1=bicycle  2=car  3=motorcycle
#               5=bus  7=truck
#   Set [0, 2] to care only about people and cars.
#
# roi : [x1, y1, x2, y2] | null
#   Pixel bounding box.  Detections outside this rectangle are
#   silently dropped.  Use ONVIF Device Manager to preview your
#   camera and pick coordinates.  null = full frame.
#
# roi_polygon : [[x,y], ...] | null
#   Arbitrary polygon ROI (takes precedence over roi if both set).
#   Useful for diagonal fences or L-shaped zones.
#
# queue_size : int  ≥1
#   Maximum frames held in memory between the RTSP reader and the
#   inference thread.  When full, OLD frames are dropped (not new).
#   30 frames ≈ 1 second buffer @ 30 fps.  Use 10–15 on low-RAM devices.
#
# retries : int  ≥-1
#   Reconnection attempts on stream drop.
#   -1 = infinite (always recover).   0 = never retry.
#   Each retry waits 2^n seconds (2, 4, 8 … up to 60 s).
#
# auto_reconnect : bool
#   Master switch for reconnect logic.  Set false only for testing.
# ============================================================

# ── Entrance camera (server GPU — full resolution, no skip) ──
entrance_cam:
  url: "rtsp://admin:pass@192.168.1.50:554/stream"
  model: "yolov8x.pt"
  conf_threshold: 0.50        # drop ghost detections below 50% certainty
  frame_skip: 1               # process every frame on GPU server
  classes: [0, 2, 3]         # person, car, motorcycle only
  roi: [50, 200, 1280, 900]  # ignore sky + road top; focus on gate zone
  roi_polygon: null
  queue_size: 60              # 2 s buffer @ 30 fps
  retries: -1                 # infinite reconnects — entrance must never go dark
  auto_reconnect: true

# ── Driveway camera (Raspberry Pi — use Nano model + skip) ───
driveway_cam:
  url: "rtsp://admin:pass@192.168.1.51:554/stream"
  model: "yolov8n.pt"         # Nano model — only YOLO variant viable on Pi
  conf_threshold: 0.45        # slightly looser — Pi can't run NMS as tight
  frame_skip: 5               # process every 5th frame for smooth Pi throughput
  classes: [0, 2]             # only person + car; ignore birds, potted plants
  roi: [100, 100, 500, 500]  # driveway only — ignores the busy street beyond
  roi_polygon: null
  queue_size: 15              # small buffer for low-RAM Pi (512 MB models)
  retries: 5                  # 5 retries = ~2+4+8+16+32 = ~62 s total wait
  auto_reconnect: true

# ── Server room (Intel NCS2 — OpenVINO backend) ──────────────
server_room_cam:
  url: "rtsp://secuser:secret@10.0.0.20:554/h264"
  model: "yolov8n.pt"         # exported to OpenVINO IR automatically
  conf_threshold: 0.55        # strict — rarely anyone in server room
  frame_skip: 5               # NCS2 recommended skip
  classes: [0]                # person only — alert on any human presence
  roi: null                   # full frame — server room is small
  roi_polygon: null
  queue_size: 20
  retries: 10
  auto_reconnect: true

# ── Parking lot (Hikvision, polygon ROI) ─────────────────────
parking_cam:
  url: "rtsp://admin:Admin123@192.168.1.64:554/Streaming/Channels/0101"
  model: "yolov8m.pt"
  conf_threshold: 0.50
  frame_skip: 3
  classes: [2, 3, 5, 7]      # car, motorcycle, bus, truck
  roi: null
  roi_polygon:               # L-shaped parking bay polygon
    - [120, 300]
    - [800, 300]
    - [800, 680]
    - [500, 680]
    - [500, 500]
    - [120, 500]
  queue_size: 30
  retries: 5
  auto_reconnect: true
